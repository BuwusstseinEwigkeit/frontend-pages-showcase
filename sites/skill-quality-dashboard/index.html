<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>技能质量看板 — Skill Quality Dashboard</title>
<style>
  :root {
    --font-sans: -apple-system, "Microsoft YaHei", "PingFang SC", "Helvetica Neue", sans-serif;
    --font-mono: "Cascadia Code", "Fira Code", "JetBrains Mono", Consolas, monospace;
    --radius-sm: 2px;
    --radius-md: 4px;
    --radius-lg: 6px;
    --radius-max: 8px;
    --color-bg: #f3f4f6;
    --color-surface: #ffffff;
    --color-border: #d1d5db;
    --color-border-light: #e5e7eb;
    --color-text: #111827;
    --color-text-secondary: #6b7280;
    --color-accent: #2563eb;
    --color-accent-hover: #1d4ed8;
    --color-success: #16a34a;
    --color-success-bg: #dcfce7;
    --color-warning: #d97706;
    --color-warning-bg: #fef3c7;
    --color-danger: #dc2626;
    --color-danger-bg: #fee2e2;
    --color-info: #0891b2;
    --color-info-bg: #cffafe;
    --color-grade-a: #16a34a;
    --color-grade-b: #2563eb;
    --color-grade-c: #d97706;
    --color-grade-d: #dc2626;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-sans);
    font-size: 15px;
    line-height: 1.6;
    color: var(--color-text);
    background: var(--color-bg);
    padding: 16px;
  }

  @media (min-width: 1024px) {
    body { padding: 24px 32px; }
  }

  h1 { font-size: 1.5rem; font-weight: 700; line-height: 1.3; }
  h2 { font-size: 1.25rem; font-weight: 600; line-height: 1.4; }
  h3 { font-size: 1.1rem; font-weight: 600; line-height: 1.4; }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }
  .header .subtitle { font-size: 0.8125rem; color: var(--color-text-secondary); }

  /* ── Summary cards ── */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .summary-card {
    background: var(--color-surface);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-lg);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .summary-card .label {
    font-size: 0.8125rem;
    color: var(--color-text-secondary);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .summary-card .value {
    font-family: var(--font-mono);
    font-size: 1.75rem;
    font-weight: 700;
    line-height: 1.2;
  }

  .grade-bar {
    display: flex;
    height: 8px;
    border-radius: var(--radius-sm);
    overflow: hidden;
    margin-top: 8px;
    gap: 2px;
  }
  .grade-bar span {
    flex: 1;
    border-radius: var(--radius-sm);
    transition: flex 0.3s ease;
  }
  .grade-bar .g-a { background: var(--color-grade-a); }
  .grade-bar .g-b { background: var(--color-grade-b); }
  .grade-bar .g-c { background: var(--color-grade-c); }
  .grade-bar .g-d { background: var(--color-grade-d); }

  .grade-legend {
    display: flex;
    gap: 12px;
    margin-top: 6px;
    font-size: 0.75rem;
    color: var(--color-text-secondary);
    font-family: var(--font-mono);
  }
  .grade-legend i {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: var(--radius-sm);
    margin-right: 4px;
    vertical-align: middle;
  }

  /* ── Filter bar ── */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .filter-bar label {
    font-size: 0.8125rem;
    font-weight: 500;
    color: var(--color-text-secondary);
  }
  .filter-bar select, .filter-bar input {
    font-family: var(--font-sans);
    font-size: 0.875rem;
    padding: 6px 10px;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    background: var(--color-surface);
    color: var(--color-text);
    min-height: 32px;
  }
  .filter-bar input { width: 200px; }

  .badge {
    display: inline-block;
    font-size: 0.6875rem;
    font-family: var(--font-mono);
    font-weight: 600;
    padding: 2px 8px;
    border-radius: var(--radius-md);
    line-height: 1.5;
  }
  .badge-pass { background: var(--color-success-bg); color: var(--color-success); }
  .badge-fail { background: var(--color-danger-bg); color: var(--color-danger); }
  .badge-warn { background: var(--color-warning-bg); color: var(--color-warning); }
  .badge-info { background: var(--color-info-bg); color: var(--color-info); }

  .score-pill {
    display: inline-block;
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 1rem;
    min-width: 44px;
    text-align: center;
    padding: 4px 10px;
    border-radius: var(--radius-md);
    line-height: 1.3;
  }
  .score-a { background: var(--color-success-bg); color: var(--color-grade-a); }
  .score-b { background: #dbeafe; color: var(--color-grade-b); }
  .score-c { background: var(--color-warning-bg); color: var(--color-grade-c); }
  .score-d { background: var(--color-danger-bg); color: var(--color-grade-d); }

  /* ── Skill list ── */
  .skill-list {
    display: grid;
    gap: 12px;
    margin-bottom: 24px;
  }

  .skill-card {
    background: var(--color-surface);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-lg);
    overflow: hidden;
    transition: box-shadow 0.15s ease;
  }
  .skill-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

  .skill-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
  }
  .skill-header:hover { background: #f9fafb; }
  .skill-header .name { font-weight: 600; flex: 1; min-width: 0; }
  .skill-header .path {
    font-size: 0.75rem;
    color: var(--color-text-secondary);
    font-family: var(--font-mono);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 220px;
  }
  .skill-header .chevron {
    font-size: 0.875rem;
    color: var(--color-text-secondary);
    transition: transform 0.2s ease;
    flex-shrink: 0;
  }
  .skill-card.open .skill-header .chevron { transform: rotate(90deg); }

  .skill-body {
    display: none;
    padding: 0 16px 16px;
    border-top: 1px solid var(--color-border-light);
  }
  .skill-card.open .skill-body { display: block; }

  /* ── Checks table ── */
  .checks-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.875rem;
    margin-top: 12px;
  }
  .checks-table th {
    text-align: left;
    font-weight: 600;
    font-size: 0.75rem;
    color: var(--color-text-secondary);
    padding: 6px 8px;
    border-bottom: 2px solid var(--color-border);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .checks-table td {
    padding: 8px;
    border-bottom: 1px solid var(--color-border-light);
    vertical-align: top;
  }
  .checks-table tr:last-child td { border-bottom: none; }
  .checks-table .check-name { font-family: var(--font-mono); font-weight: 500; white-space: nowrap; }
  .checks-table .check-detail { color: var(--color-text-secondary); font-size: 0.8125rem; max-width: 500px; word-break: break-word; }

  /* ── Warnings section ── */
  .warnings-section {
    margin-top: 12px;
    padding: 10px 12px;
    background: var(--color-warning-bg);
    border-radius: var(--radius-md);
  }
  .warnings-section h4 {
    font-size: 0.8125rem;
    font-weight: 600;
    color: var(--color-warning);
    margin-bottom: 6px;
  }
  .warnings-section ul {
    list-style: none;
    padding: 0;
  }
  .warnings-section li {
    font-size: 0.8125rem;
    font-family: var(--font-mono);
    color: var(--color-text);
    padding: 2px 0;
  }
  .warnings-section li::before {
    content: "⚠";
    margin-right: 6px;
  }

  .no-warnings {
    margin-top: 12px;
    padding: 10px 12px;
    background: var(--color-success-bg);
    border-radius: var(--radius-md);
    font-size: 0.8125rem;
    color: var(--color-success);
    font-weight: 500;
  }

  /* ── Description ── */
  .desc-block {
    margin-top: 12px;
    padding: 10px 12px;
    background: #f9fafb;
    border-radius: var(--radius-md);
    font-size: 0.8125rem;
    color: var(--color-text-secondary);
    line-height: 1.5;
    max-height: 120px;
    overflow: hidden;
    position: relative;
  }
  .desc-block.expanded { max-height: none; }
  .desc-toggle {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 32px;
    background: linear-gradient(transparent, #f9fafb);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 2px;
    cursor: pointer;
    font-size: 0.75rem;
    color: var(--color-accent);
  }
  .desc-block.expanded .desc-toggle { display: none; }

  /* ── Footer ── */
  .footer {
    text-align: center;
    font-size: 0.75rem;
    color: var(--color-text-secondary);
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid var(--color-border-light);
  }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 48px 16px;
    color: var(--color-text-secondary);
    background: var(--color-surface);
    border: 1px dashed var(--color-border);
    border-radius: var(--radius-lg);
  }

  @media (max-width: 639px) {
    .skill-header .path { display: none; }
    .filter-bar input { width: 100%; }
  }
</style>
</head>
<body>

<div class="header">

  // ── Helpers ──
  function gradeFor(score) {
    if (score >= 90) return 'A';
    if (score >= 70) return 'B';
    if (score >= 40) return 'C';
    return 'D';
  }

  function scoreClass(score) {
    return 'score-' + gradeFor(score).toLowerCase();
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // ── Render summary ──
  function renderSummary() {
    const s = DATA.summary;
    const grid = document.getElementById('summary-grid');

    const total = s.total;
    const avg = s.avgScore;
    const passRate = s.passRate;
    const gradeKeys = ['A', 'B', 'C', 'D'];

    let gradeBarHtml = '';
    gradeKeys.forEach(g => {
      const count = s.byGrade[g] || 0;
      const pct = total > 0 ? (count / total * 100) : 0;
      gradeBarHtml += `<span class="g-${g.toLowerCase()}" style="flex:${Math.max(pct, 1)}" title="${g}: ${count}"></span>`;
    });

    let legendHtml = '';
    gradeKeys.forEach(g => {
      const count = s.byGrade[g] || 0;
      const colors = { A: 'var(--color-grade-a)', B: 'var(--color-grade-b)', C: 'var(--color-grade-c)', D: 'var(--color-grade-d)' };
      legendHtml += `<span><i style="background:${colors[g]}"></i>${g} ${count}</span>`;
    });

    grid.innerHTML = `
      <div class="summary-card">
        <div class="label">技能总数</div>
        <div class="value">${total}</div>
      </div>
      <div class="summary-card">
        <div class="label">平均分</div>
        <div class="value ${scoreClass(avg)}">${avg}</div>
      </div>
      <div class="summary-card">
        <div class="label">通过率（≥70分）</div>
        <div class="value">${passRate}%</div>
      </div>
      <div class="summary-card">
        <div class="label">等级分布</div>
        <div class="grade-bar">${gradeBarHtml}</div>
        <div class="grade-legend">${legendHtml}</div>
      </div>
    `;

    document.getElementById('scan-time').textContent = '扫描时间：' + new Date(DATA.generatedAt).toLocaleString('zh-CN');
    document.getElementById('footer-time').textContent = new Date(DATA.generatedAt).toLocaleString('zh-CN');

  // ── Render skill list ──

    const searchTerm = document.getElementById('filter-search').value.toLowerCase().trim();

    const filtered = DATA.skills.filter(sk => {
      const g = gradeFor(sk.score);
      if (gradeFilter !== 'all' && g !== gradeFilter) return false;
      if (warningFilter === 'has' && sk.warnings.length === 0) return false;
      if (warningFilter === 'none' && sk.warnings.length > 0) return false;
      if (searchTerm && !sk.name.toLowerCase().includes(searchTerm) && !sk.path.toLowerCase().includes(searchTerm)) return false;
      return true;
    });

    const list = document.getElementById('skill-list');

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty">没有匹配的技能</div>';
      return;
    }

    list.innerHTML = filtered.map((sk, i) => {
      const g = gradeFor(sk.score);
      const checksHtml = sk.checks.map(c => `
        <tr>
          <td class="check-name">${escapeHtml(c.name)}</td>
          <td><span class="badge ${c.pass ? 'badge-pass' : 'badge-fail'}">${c.pass ? 'PASS' : 'FAIL'}</span></td>
          <td class="check-detail">${escapeHtml(c.detail)}</td>
        </tr>
      `).join('');

      let warningsHtml;
      if (sk.warnings.length > 0) {
        warningsHtml = `
          <div class="warnings-section">
            <h4>Warnings (${sk.warnings.length})</h4>
            <ul>${sk.warnings.map(w => `<li>${escapeHtml(w)}</li>`).join('')}</ul>
          </div>`;
      } else {
        warningsHtml = '<div class="no-warnings">✓ 无 warnings</div>';
      }

      const descText = sk.description || '（无描述）';
      const descTruncated = descText.length > 200;
      const descHtml = `
        <div class="desc-block${descTruncated ? '' : ''}" id="desc-${i}">
          ${escapeHtml(descText)}
          ${descTruncated ? '<div class="desc-toggle" onclick="toggleDesc(this)">展开全文 ▾</div>' : ''}
        </div>`;

      return `
        <div class="skill-card" data-index="${i}">
          <div class="skill-header" onclick="toggleCard(this)">
            <span class="score-pill ${scoreClass(sk.score)}">${sk.score}</span>
            <span class="name">${escapeHtml(sk.name)}</span>
            <span class="path">${escapeHtml(sk.path)}</span>
            <span class="chevron">▸</span>
          </div>
          <div class="skill-body">
            <div style="display:flex;align-items:center;gap:8px;margin-top:12px">
              <span class="badge badge-info">等级 ${g}</span>
              <span class="badge ${sk.warnings.length > 0 ? 'badge-warn' : 'badge-pass'}">
                ${sk.warnings.length > 0 ? sk.warnings.length + ' warnings' : '无 warnings'}
              </span>
            </div>
            <h4 style="font-size:0.875rem;margin-top:12px;margin-bottom:2px;font-weight:600;color:var(--color-text-secondary)">描述</h4>
            ${descHtml}
            <h4 style="font-size:0.875rem;margin-top:12px;margin-bottom:2px;font-weight:600;color:var(--color-text-secondary)">检查项</h4>
            <table class="checks-table">
              <thead><tr><th>检查项</th><th>状态</th><th>详情</th></tr></thead>
              <tbody>${checksHtml}</tbody>
            </table>
            ${warningsHtml}
          </div>
        </div>`;
    }).join('');
  }

  // ── Interactions ──
  window.toggleCard = function(header) {
    header.closest('.skill-card').classList.toggle('open');
  };

  window.toggleDesc = function(btn) {
    btn.closest('.desc-block').classList.toggle('expanded');
  };

  document.getElementById('filter-grade').addEventListener('change', renderList);
  document.getElementById('filter-warning').addEventListener('change', renderList);
  document.getElementById('filter-search').addEventListener('input', renderList);

  // ── Init ──
  renderSummary();
  renderList();
})();
</script>
</body>
</html>
